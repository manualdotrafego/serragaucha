<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Polos - Serra Gaúcha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            background: #ffffff;
            color: #333;
            border-radius: 20px;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #2e7d32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(46, 125, 50, 0); }
        }

        .icon svg {
            width: 44px;
            height: 44px;
            fill: #fff;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1b5e20;
        }

        p {
            font-size: 16px;
            color: #555;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #2e7d32;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fallback {
            margin-top: 24px;
            font-size: 14px;
            color: #888;
        }

        .fallback a {
            color: #2e7d32;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .fallback a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/>
            </svg>
        </div>
        <div class="spinner"></div>
        <h1>Projeto Polos - Serra Gaúcha</h1>
        <p>Estamos preparando seu atendimento. Aguarde um instante...</p>
        <div class="fallback">
            Se não for redirecionado automaticamente,
            <a id="continue-link">clique aqui para continuar</a>.
        </div>
    </div>

    <script>
        (function() {
            var parts = ['aHR0cHM6Ly9hcGku', 'd2hhdHNhcHAuY29t', 'L3NlbmQ/cGhvbmU9', 'NTU1NDk4MTIyMTEx', 'OSZ0ZXh0PU9sJUMz', 'JUExJTJDJTIwc291', 'JTIwZGElMjBTZXJy', 'YSUyMEdhJUMzJUJB', 'Y2hhJTIwZSUyMGdv', 'c3RhcmlhJTIwZGUl', 'MjBzYWJlciUyMG1h', 'aXMlMjBzb2JyZSUy', 'MG8lMjBQcm9qZXRv', 'JTIwUG9sb3M='];
            var target = atob(parts.join(''));

            var link = document.getElementById('continue-link');
            link.addEventListener('click', function() { window.location.href = target; });

            setTimeout(function() { window.location.href = target; }, 3000);
        })();
    </script>
</body>
</html>
